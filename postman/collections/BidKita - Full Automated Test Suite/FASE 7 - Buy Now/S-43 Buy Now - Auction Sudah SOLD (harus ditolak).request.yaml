$kind: http-request
url: "{{base_url}}/api/auctions/{{auction_macbook_id}}/buynow"
method: POST
headers:
  Content-Type: application/json
auth:
  type: bearer
  credentials:
    token: "{{buyer_token}}"
scripts:
  - type: afterResponse
    code: pm.test('Status code is 400', function () { pm.response.to.have.status(400); });
    language: text/javascript
order: 4000
