$kind: http-request
url: "{{base_url}}/api/auctions/{{auction_macbook_id}}/buynow"
method: POST
headers:
  Content-Type: application/json
auth:
  type: bearer
  credentials:
    token: "{{buyer_token}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200 (atau 400 jika saldo kurang - cek manual)', function () { pm.expect([200,400]).to.include(pm.response.code); });
      if (pm.response.code === 200) { pm.test('Status jadi SOLD', function () { pm.expect(pm.response.json().status).to.eql('SOLD'); }); }
    language: text/javascript
order: 1000
