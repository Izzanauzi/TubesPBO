$kind: http-request
url: "{{base_url}}/api/auth/register"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "username": "validuser51",
      "email": "validemail51@email.com",
      "password": "test123",
      "phone": "62812345678",
      "role": "BUYER"
    }
scripts:
  - type: afterResponse
    code: pm.test('Status code is 400', function () { pm.response.to.have.status(400); });
    language: text/javascript
order: 3000
