$kind: http-request
url: "{{base_url}}/api/auth/register"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "username": "validuser52",
      "email": "validemail52@email.com",
      "password": "test123",
      "phone": "+62812345678",
      "role": "BUYER"
    }
scripts:
