$kind: http-request
name: S-59 GET admin/users - Cek Password Tidak Terekspos
url: "{{base_url}}/api/admin/users"
method: GET
headers:
  Content-Type: application/json
auth:
  type: bearer
  credentials:
    token: "{{admin_token}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () { pm.response.to.have.status(200); });
      const arr = pm.response.json();
      pm.test('Tidak ada field password di response', function () { arr.forEach(u => pm.expect(u).to.not.have.property('password')); });
    language: text/javascript
order: 3000
