$kind: http-request
name: S-57 GET seller/auctions - Cek Field Lengkap Sesuai DTO
url: "{{base_url}}/api/seller/auctions"
method: GET
headers:
  Content-Type: application/json
auth:
  type: bearer
  credentials:
    token: "{{seller_token}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () { pm.response.to.have.status(200); });
      const arr = pm.response.json();
      if (arr.length > 0) {
        const a = arr[0];
        const requiredFields = ['auctionId','title','category','status','currentPrice','remainingTimeSeconds','sellerName','totalBids','buyNowPrice'];
        requiredFields.forEach(f => pm.test('Field ' + f + ' ada', function () { pm.expect(a).to.have.property(f); }));
      }
    language: text/javascript
order: 1000
