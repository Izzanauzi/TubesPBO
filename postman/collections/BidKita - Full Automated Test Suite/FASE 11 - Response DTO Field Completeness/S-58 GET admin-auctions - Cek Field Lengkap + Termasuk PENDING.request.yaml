$kind: http-request
name: S-58 GET admin/auctions - Cek Field Lengkap + Termasuk PENDING
url: "{{base_url}}/api/admin/auctions"
method: GET
headers:
  Content-Type: application/json
auth:
  type: bearer
  credentials:
    token: "{{admin_token}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () { pm.response.to.have.status(200); });
      const arr = pm.response.json();
      pm.test('Ada minimal 1 auction', function () { pm.expect(arr.length).to.be.above(0); });
      if (arr.length > 0) {
        const requiredFields = ['auctionId','title','status','currentPrice'];
        requiredFields.forEach(f => pm.test('Field ' + f + ' ada', function () { pm.expect(arr[0]).to.have.property(f); }));
      }
    language: text/javascript
order: 2000
