$kind: http-request
url: "{{base_url}}/api/wallet"
method: GET
headers:
  Content-Type: application/json
auth:
  type: bearer
  credentials:
    token: "{{buyer_token}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () { pm.response.to.have.status(200); });
      const j = pm.response.json();
      pm.test('Ada field walletId, balance, transactions', function () { pm.expect(j).to.have.all.keys('walletId','balance','transactions'); });
    language: text/javascript
order: 4000
