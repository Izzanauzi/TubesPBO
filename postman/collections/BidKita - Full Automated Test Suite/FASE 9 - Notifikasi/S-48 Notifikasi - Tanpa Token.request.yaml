$kind: http-request
url: "{{base_url}}/api/notifications"
method: GET
headers:
  Content-Type: application/json
scripts:
  - type: afterResponse
    code: pm.test('Status code is 401 or 403', function () { pm.expect([401,403]).to.include(pm.response.code); });
    language: text/javascript
order: 3000
