$kind: http-request
url: "{{base_url}}/api/auth/me"
method: GET
headers:
  Content-Type: application/json
auth:
  type: bearer
  credentials:
    token: "{{buyer_token}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () { pm.response.to.have.status(200); });
      pm.test('Tidak ada field password', function () { pm.expect(pm.response.json()).to.not.have.property('password'); });
    language: text/javascript
order: 10000
