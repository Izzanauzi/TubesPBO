$kind: http-request
url: "{{base_url}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "buyer1@bidkita.com",
      "password": "salah123"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 401', function () { pm.response.to.have.status(401); });
      pm.test('Message sesuai', function () { pm.expect(pm.response.json().message).to.include('salah'); });
    language: text/javascript
order: 5000
