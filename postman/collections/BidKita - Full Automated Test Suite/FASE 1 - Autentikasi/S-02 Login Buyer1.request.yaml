$kind: http-request
url: "{{base_url}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "buyer1@bidkita.com",
      "password": "buyer123"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () { pm.response.to.have.status(200); });
      pm.test('Role is BUYER', function () { pm.expect(pm.response.json().role).to.eql('BUYER'); });
      const j = pm.response.json();
      pm.collectionVariables.set('buyer_token', j.accessToken);
      pm.collectionVariables.set('buyer_id', j.userId);
    language: text/javascript
order: 2000
