$kind: http-request
url: "{{base_url}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "admin@bidkita.com",
      "password": "admin123"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () { pm.response.to.have.status(200); });
      pm.test('Role is ADMIN', function () { pm.expect(pm.response.json().role).to.eql('ADMIN'); });
      const j = pm.response.json();
      pm.collectionVariables.set('admin_token', j.accessToken);
    language: text/javascript
order: 1000
