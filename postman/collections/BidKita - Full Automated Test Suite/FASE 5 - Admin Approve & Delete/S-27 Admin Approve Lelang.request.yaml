$kind: http-request
url: "{{base_url}}/api/auctions/{{auction_id_pending}}/approve"
method: PUT
headers:
  Content-Type: application/json
auth:
  type: bearer
  credentials:
    token: "{{admin_token}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () { pm.response.to.have.status(200); });
      pm.test('Status jadi OPEN', function () { pm.expect(pm.response.json().status).to.eql('OPEN'); });
    language: text/javascript
order: 1000
