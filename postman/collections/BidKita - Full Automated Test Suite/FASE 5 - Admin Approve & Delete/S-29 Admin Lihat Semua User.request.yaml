$kind: http-request
url: "{{base_url}}/api/admin/users"
method: GET
headers:
  Content-Type: application/json
auth:
  type: bearer
  credentials:
    token: "{{admin_token}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () { pm.response.to.have.status(200); });
      pm.test('Response adalah array', function () { pm.expect(pm.response.json()).to.be.an('array'); });
    language: text/javascript
order: 3000
