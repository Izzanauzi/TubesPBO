$kind: http-request
url: "{{base_url}}/api/wallet"
method: GET
headers:
  Content-Type: application/json
auth:
  type: bearer
  credentials:
    token: "{{buyer_token}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () { pm.response.to.have.status(200); });
      pm.test('Ada field balance', function () { pm.expect(pm.response.json()).to.have.property('balance'); });
    language: text/javascript
order: 1000
