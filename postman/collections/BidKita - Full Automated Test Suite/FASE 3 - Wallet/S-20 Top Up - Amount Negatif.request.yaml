$kind: http-request
url: "{{base_url}}/api/wallet/topup"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "amount": -1000,
      "paymentMethod": "BANK_TRANSFER"
    }
auth:
  type: bearer
  credentials:
    token: "{{buyer_token}}"
scripts:
  - type: afterResponse
    code: pm.test('Status code is 400', function () { pm.response.to.have.status(400); });
    language: text/javascript
order: 3000
