$kind: http-request
url: "{{base_url}}/api/auctions"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "category": "ELEKTRONIK",
      "title": "Test",
      "description": "Test",
      "condition": "BARU",
      "startingPrice": 100000,
      "duration": 1
    }
auth:
  type: bearer
  credentials:
    token: "{{buyer_token}}"
scripts:
  - type: afterResponse
    code: pm.test('Status code is 403', function () { pm.response.to.have.status(403); });
    language: text/javascript
order: 3000
