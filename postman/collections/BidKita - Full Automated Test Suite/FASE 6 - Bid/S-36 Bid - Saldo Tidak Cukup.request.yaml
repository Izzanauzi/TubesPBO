$kind: http-request
url: "{{base_url}}/api/auctions/{{auction_open_id}}/bid"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "amount": 999999999
    }
auth:
  type: bearer
  credentials:
    token: "{{buyer_token}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 400', function () { pm.response.to.have.status(400); });
      pm.test('Message sesuai', function () { pm.expect(pm.response.json().message).to.include('mencukupi'); });
    language: text/javascript
order: 4000
