$kind: http-request
url: "{{base_url}}/api/buyer/bids"
method: GET
headers:
  Content-Type: application/json
auth:
  type: bearer
  credentials:
    token: "{{buyer_token}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () { pm.response.to.have.status(200); });
      const arr = pm.response.json();
      pm.test('Response adalah array', function () { pm.expect(arr).to.be.an('array'); });
      if (arr.length > 0) { pm.test('Ada field isWinning', function () { pm.expect(arr[0]).to.have.property('isWinning'); }); }
    language: text/javascript
order: 7000
