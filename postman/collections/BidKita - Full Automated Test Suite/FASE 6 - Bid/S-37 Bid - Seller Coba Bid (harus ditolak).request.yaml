$kind: http-request
url: "{{base_url}}/api/auctions/{{auction_open_id}}/bid"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "amount": 9600000
    }
auth:
  type: bearer
  credentials:
    token: "{{seller_token}}"
scripts:
  - type: afterResponse
    code: pm.test('Status code is 403', function () { pm.response.to.have.status(403); });
    language: text/javascript
order: 5000
